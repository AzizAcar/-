<!DOCTYPE html>
<html lang="tr">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta charset="UTF-8">
  <title>Doğum günün kutlu olsun 🎉🥳</title>

  <!--bunu görüyorsan bil ki senden hoşlanıyorum :) iyiki varsın ❤-->

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0f0f0f;
      color: #ffffff;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    .card {
      padding: 30px;
      margin: 20px;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      max-width: 90%;
    }

    h1 {
      font-size: 26px;
      margin-bottom: 20px;
    }

    button {
      padding: 12px 24px;
      border: none;
      border-radius: 12px;
      background: #ffffff;
      color: #000;
      cursor: pointer;
      font-size: 16px;
      transition: 0.3s;
      width: 100%;
    }

    button:hover {
      background: #dddddd;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
  </style>
</head>

<body>

  <div class="card">
    <h1>🎉 İyi ki Doğdun!</h1>
    <button onclick="surprise()">Tıkla 🎁</button>
  </div>

  <script>
    function surprise() {
      var duration = 2000;
      var end = Date.now() + duration;

      (function frame() {
        confetti({
          particleCount: 10,
          angle: 60,
          spread: 60,
          origin: { x: 0 }
        });

        confetti({
          particleCount: 10,
          angle: 120,
          spread: 60,
          origin: { x: 1 }
        });

        if (Date.now() < end) {
          requestAnimationFrame(frame);
        }
      })();
    }
  </script>

</body>
</html>
