<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Küçük bir hediye :)</title>

  <!-- Bunu görüyorsan senden hoşlandığımı bilmelisin :) ❤ -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0f0f0f;
      color: #ffffff;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    .card {
      padding: 30px;
      margin: 20px;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      max-width: 90%;
    }

    h1 {
      font-size: 26px;
      margin-bottom: 20px;
    }

    button {
      width: 100%;
      padding: 12px 24px;
      border: none;
      border-radius: 12px;
      background: #ffffff;
      color: #000;
      cursor: pointer;
      font-size: 16px;
      transition: 0.3s;
    }

    button:hover {
      background: #dddddd;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
  </style>
</head>

<body>

  <div class="card">
    <h1>İyi ki Doğdun💙🎊 :) </h1>
    <button id="confettiBtn">Tıkla 🎁</button>
    <!-- Doğum günü düdüğü -->
    <audio id="birthdaySound" src="https://www.soundjay.com/human/birthday-bell-1.mp3" preload="auto"></audio>
  </div>

  <script>
    const btn = document.getElementById("confettiBtn");
    const sound = document.getElementById("birthdaySound");
    let isCoolingDown = false;

    // Buton yazıları
    const messages = [
      "Patlat 🎊🎉",
      "Sürpriz 🎊🎉",
      "Tekrar 🎊🎉"
    ];

    function getRandomMessage() {
      return messages[Math.floor(Math.random() * messages.length)];
    }

    btn.addEventListener("click", () => {
      if (isCoolingDown) return;

      isCoolingDown = true;
      btn.disabled = true;

      setTimeout(() => {
        isCoolingDown = false;
        btn.disabled = false;
        btn.innerText = getRandomMessage(); // her tıklamada yazı değişir
      }, 4000); // 4 saniye cooldown

      // konfeti animasyonu
      const duration = 2000;
      const end = Date.now() + duration;

      (function frame() {
        confetti({
          particleCount: 10,
          angle: 60,
          spread: 80,
          startVelocity: 45,
          origin: { x: 0 }
        });
        confetti({
          particleCount: 10,
          angle: 120,
          spread: 80,
          startVelocity: 45,
          origin: { x: 1 }
        });
        if (Date.now() < end) {
          requestAnimationFrame(frame);
        }
      })();

      // düdük çal
      sound.currentTime = 0; // baştan çal
      sound.play();
    });
  </script>

</body>
</html>
